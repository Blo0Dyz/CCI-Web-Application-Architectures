<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Document</title>
</head>
<body>
    <section class="calculator">
        <input type="number" id="num1" placeholder="First number">
        <input type="number" id="num2" placeholder="Second number">

        <button id="booto">Add</button>
        <p id="result">Resultado</p>
    <script src="Scripts/main.js"></script>
    </section>
    
    <section class="emailValidate">
        <form onsubmit="validateForm()">
        <label>Email: <input type="text" id="email"></label>
        <input type="submit" value="Submit">

        </form>
        <p id="formMessage"></p>
        <script src="Scripts/email.js"></script>
    </section>

    <section class="imageTest" >
        <h2>Products</h2>
        <div class="product-grid" id="product-grid" style="display: grid; grid-template-columns: 1fr 1fr">
            <div class="card">Old product</div>
        </div>
        <button id="add-card-btn">Add New Product</button>
        <script src="Scripts/image.js"></script>
    </section>

    <section class="productsView">
        <div class="gridView" id="gridView" style="display: grid; grid-template-columns: 1fr 1fr">


        </div>
        <script src="Scripts/product.js"></script>
    </section>

</body>
</html>
